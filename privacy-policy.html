<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kebijakan Privasi — Farvion</title>
<style>
  :root{
    --ink:#1a1a1a;
    --ink-soft:#5a5a52;
    --paper:#fdfcf8;
    --cream:#f5f2ea;
    --cream-2:#eeeae0;
    --terracotta:#c1633d;
    --terracotta-deep:#a8502e;
    --border:#e2ddd0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:48px 24px 96px;
  }
  .lang-toggle{
    position:fixed;
    top:16px;
    right:16px;
    display:flex;
    background:var(--cream-2);
    border:1px solid var(--border);
    border-radius:999px;
    padding:3px;
    z-index:10;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .lang-btn{
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-size:13px;
    font-weight:700;
    letter-spacing:.02em;
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
  }
  .lang-btn.active{
    background:var(--terracotta-deep);
    color:#fff;
  }
  header{
    margin-bottom:40px;
    padding-bottom:24px;
    border-bottom:2px solid var(--border);
  }
  .eyebrow{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--terracotta-deep);
    background:var(--cream);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  h1{
    font-size:28px;
    margin:0 0 8px;
    letter-spacing:-.01em;
  }
  .meta{
    font-size:14px;
    color:var(--ink-soft);
  }
  h2{
    font-size:19px;
    margin:36px 0 12px;
    padding-top:4px;
  }
  h3{
    font-size:15px;
    margin:20px 0 8px;
    color:var(--ink);
  }
  p{ margin:0 0 14px; color:var(--ink); }
  ul, ol{ margin:0 0 14px; padding-left:22px; }
  li{ margin-bottom:6px; }
  .card{
    background:var(--cream);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    font-size:14.5px;
  }
  .card strong{ color:var(--terracotta-deep); }
  table{
    width:100%;
    border-collapse:collapse;
    margin:14px 0 20px;
    font-size:14px;
  }
  th, td{
    text-align:left;
    padding:10px 12px;
    border:1px solid var(--border);
    vertical-align:top;
  }
  th{
    background:var(--cream);
    font-weight:700;
    font-size:13px;
    letter-spacing:.02em;
  }
  a{ color:var(--terracotta-deep); }
  .contact{
    background:var(--cream-2);
    border-radius:12px;
    padding:20px;
    margin-top:32px;
  }
  .contact a{ font-weight:600; }
  footer{
    margin-top:48px;
    padding-top:20px;
    border-top:1px solid var(--border);
    font-size:13px;
    color:var(--ink-soft);
  }
  code{
    background:var(--cream-2);
    padding:1px 6px;
    border-radius:5px;
    font-size:.9em;
  }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn" id="btnId" onclick="setLang('id')">ID</button>
  <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
</div>

<div class="wrap" id="content"></div>

<script>
const CONTENT = {
  id: {
    docTitle: 'Kebijakan Privasi — Farvion',
    eyebrow: 'Legal',
    title: 'Kebijakan Privasi Farvion',
    updated: 'Terakhir diperbarui: 20 Juli 2026',
    body: `
      <p>Farvion ("kami", "aplikasi") adalah aplikasi chat berbasis AI yang dikembangkan dan dioperasikan secara independen. Kebijakan Privasi ini menjelaskan data apa yang kami kumpulkan, bagaimana data itu digunakan, disimpan, dan dilindungi saat Anda menggunakan Farvion.</p>

      <p>Dengan menggunakan Farvion, Anda menyetujui praktik yang dijelaskan dalam kebijakan ini. Jika Anda tidak setuju, mohon untuk tidak menggunakan aplikasi ini.</p>

      <h2>1. Data yang Kami Kumpulkan</h2>

      <h3>1.1 Data Akun</h3>
      <p>Saat Anda masuk (sign in) ke Farvion menggunakan Firebase Authentication (Google Sign-In atau email/kata sandi), kami menerima dan menyimpan:</p>
      <ul>
        <li>Alamat email</li>
        <li>Nama tampilan dan foto profil (jika masuk lewat Google)</li>
        <li>Identitas unik akun (User ID) yang dibuat oleh Firebase Authentication</li>
      </ul>

      <h3>1.2 Riwayat Percakapan</h3>
      <p>Isi percakapan Anda dengan Farvion — termasuk pesan yang Anda kirim, respons AI, dan lampiran teks/file yang Anda sertakan — disimpan di Cloud Firestore (Google Firebase) yang terhubung ke akun Anda, agar riwayat chat dapat diakses kembali di sesi berikutnya.</p>

      <h3>1.3 Kunci API (API Key)</h3>
      <p>Jika Anda memasukkan kunci API milik Anda sendiri (misalnya untuk penyedia AI pihak ketiga), kunci tersebut disimpan di Cloud Firestore, terasosiasi dengan akun Anda, dan hanya digunakan untuk meneruskan permintaan atas nama Anda ke penyedia layanan terkait.</p>

      <h3>1.4 Data dari Konektor Pihak Ketiga (Opsional)</h3>
      <p>Farvion menyediakan fitur konektor opsional yang dapat Anda hubungkan atau putuskan kapan saja:</p>
      <table>
        <tr><th>Konektor</th><th>Data yang diakses</th><th>Tujuan</th></tr>
        <tr>
          <td>GitHub</td>
          <td>Token akses OAuth atau Personal Access Token, daftar repository, dan isi file yang Anda pilih untuk dilampirkan</td>
          <td>Menjelajahi repository dan melampirkan isi file ke percakapan atas permintaan Anda</td>
        </tr>
        <tr>
          <td>Google Drive</td>
          <td>Token akses dan refresh OAuth (scope <code>drive.readonly</code>), daftar file/folder, isi file yang Anda pilih untuk dilampirkan</td>
          <td>Menjelajahi Google Drive dan melampirkan isi file ke percakapan atas permintaan Anda</td>
        </tr>
      </table>
      <p>Token akses konektor ini disimpan secara lokal di perangkat Anda (localStorage browser), <strong>bukan</strong> di server kami. Farvion hanya membaca (read-only) data dari layanan ini; kami tidak pernah mengubah, menghapus, atau menulis apa pun ke akun GitHub atau Google Drive Anda.</p>

      <div class="card">
        <strong>Catatan penting:</strong> Client Secret untuk OAuth GitHub dan Google Drive disimpan secara aman di server proxy (Cloudflare Workers) milik kami dan tidak pernah diekspos ke kode aplikasi atau perangkat Anda.
      </div>

      <h2>2. Bagaimana Kami Menggunakan Data Anda</h2>
      <ul>
        <li>Mengautentikasi dan mengelola akun Anda</li>
        <li>Menyimpan dan menampilkan kembali riwayat percakapan Anda</li>
        <li>Meneruskan pesan Anda ke penyedia model AI (Google Gemini) untuk menghasilkan respons</li>
        <li>Menjalankan fitur konektor (GitHub, Google Drive) sesuai permintaan eksplisit Anda</li>
        <li>Memelihara dan meningkatkan keandalan aplikasi</li>
      </ul>
      <p>Kami <strong>tidak menjual</strong> data pribadi Anda kepada pihak ketiga, dan tidak menggunakan data Anda untuk iklan.</p>

      <h2>3. Penyimpanan dan Keamanan Data</h2>
      <p>Data akun, riwayat chat, dan kunci API disimpan di Cloud Firestore (Google Firebase), yang dilindungi oleh aturan keamanan (Firestore Security Rules) sehingga hanya pemilik akun yang dapat mengakses datanya sendiri. Token konektor pihak ketiga (GitHub, Google Drive) disimpan secara lokal di perangkat/browser Anda dan dapat dihapus kapan saja melalui tombol "Putuskan" di dalam aplikasi.</p>
      <p>Meskipun kami menerapkan langkah-langkah keamanan yang wajar, tidak ada metode transmisi atau penyimpanan data elektronik yang 100% aman. Kami tidak dapat menjamin keamanan mutlak.</p>

      <h2>4. Berbagi Data dengan Pihak Ketiga</h2>
      <p>Kami membagikan data secukupnya kepada pihak ketiga berikut, semata-mata untuk menjalankan fungsi aplikasi:</p>
      <ul>
        <li><strong>Google Firebase</strong> — autentikasi, penyimpanan riwayat chat dan kunci API</li>
        <li><strong>Google Gemini API</strong> — memproses pesan Anda untuk menghasilkan respons AI</li>
        <li><strong>GitHub API</strong> — hanya jika Anda menghubungkan konektor GitHub</li>
        <li><strong>Google Drive API</strong> — hanya jika Anda menghubungkan konektor Google Drive</li>
        <li><strong>Cloudflare Workers</strong> — sebagai proxy aman untuk pertukaran token OAuth</li>
      </ul>
      <p>Kami tidak membagikan data Anda kepada pihak lain di luar daftar di atas kecuali diwajibkan oleh hukum.</p>

      <h2>5. Hak Anda</h2>
      <ul>
        <li><strong>Akses:</strong> Anda dapat melihat riwayat chat Anda kapan saja di dalam aplikasi.</li>
        <li><strong>Penghapusan:</strong> Anda dapat menghapus percakapan, memutuskan konektor, atau meminta penghapusan akun dan seluruh data terkait dengan menghubungi kami.</li>
        <li><strong>Pencabutan akses konektor:</strong> Anda dapat memutuskan koneksi GitHub atau Google Drive kapan saja dari menu Konektor di dalam aplikasi, atau mencabut akses langsung dari halaman <a href="https://myaccount.google.com/permissions" target="_blank" rel="noopener">Google Account Permissions</a> / <a href="https://github.com/settings/applications" target="_blank" rel="noopener">GitHub Authorized Apps</a>.</li>
      </ul>

      <h2>6. Privasi Anak</h2>
      <p>Farvion tidak ditujukan untuk anak di bawah usia 13 tahun. Kami tidak dengan sengaja mengumpulkan data pribadi dari anak-anak.</p>

      <h2>7. Perubahan Kebijakan</h2>
      <p>Kami dapat memperbarui Kebijakan Privasi ini dari waktu ke waktu. Perubahan akan tercermin melalui tanggal "Terakhir diperbarui" di bagian atas halaman ini. Penggunaan Farvion setelah perubahan berarti Anda menyetujui kebijakan yang telah diperbarui.</p>

      <div class="contact">
        <strong>Ada pertanyaan tentang privasi Anda?</strong>
        <p style="margin:8px 0 0;">Hubungi kami di <a href="mailto:alfinpinzz6@gmail.com">alfinpinzz6@gmail.com</a></p>
      </div>

      <footer>
        Farvion — Kebijakan Privasi ini berlaku untuk aplikasi web Farvion dan seluruh fiturnya.
      </footer>
    `
  },
  en: {
    docTitle: 'Privacy Policy — Farvion',
    eyebrow: 'Legal',
    title: 'Farvion Privacy Policy',
    updated: 'Last updated: July 20, 2026',
    body: `
      <p>Farvion ("we", "the app") is an AI-powered chat application developed and operated independently. This Privacy Policy explains what data we collect, how it is used, stored, and protected when you use Farvion.</p>

      <p>By using Farvion, you agree to the practices described in this policy. If you do not agree, please do not use this application.</p>

      <h2>1. Data We Collect</h2>

      <h3>1.1 Account Data</h3>
      <p>When you sign in to Farvion using Firebase Authentication (Google Sign-In or email/password), we receive and store:</p>
      <ul>
        <li>Email address</li>
        <li>Display name and profile photo (if signed in via Google)</li>
        <li>A unique account identifier (User ID) generated by Firebase Authentication</li>
      </ul>

      <h3>1.2 Conversation History</h3>
      <p>The content of your conversations with Farvion — including messages you send, AI responses, and text/file attachments you include — is stored in Cloud Firestore (Google Firebase) linked to your account, so your chat history can be retrieved in future sessions.</p>

      <h3>1.3 API Keys</h3>
      <p>If you enter your own API key (for example, for a third-party AI provider), the key is stored in Cloud Firestore, associated with your account, and used only to forward requests on your behalf to the relevant service provider.</p>

      <h3>1.4 Data from Third-Party Connectors (Optional)</h3>
      <p>Farvion provides optional connector features that you can connect or disconnect at any time:</p>
      <table>
        <tr><th>Connector</th><th>Data accessed</th><th>Purpose</th></tr>
        <tr>
          <td>GitHub</td>
          <td>OAuth access token or Personal Access Token, list of repositories, and the content of files you choose to attach</td>
          <td>Browsing repositories and attaching file content to a conversation at your request</td>
        </tr>
        <tr>
          <td>Google Drive</td>
          <td>OAuth access and refresh tokens (scope <code>drive.readonly</code>), list of files/folders, and the content of files you choose to attach</td>
          <td>Browsing Google Drive and attaching file content to a conversation at your request</td>
        </tr>
      </table>
      <p>Connector access tokens are stored locally on your device (browser localStorage), <strong>not</strong> on our servers. Farvion only reads (read-only) data from these services; we never modify, delete, or write anything to your GitHub or Google Drive account.</p>

      <div class="card">
        <strong>Important note:</strong> The Client Secret for GitHub and Google Drive OAuth is stored securely on our proxy server (Cloudflare Workers) and is never exposed in the application code or on your device.
      </div>

      <h2>2. How We Use Your Data</h2>
      <ul>
        <li>Authenticating and managing your account</li>
        <li>Storing and displaying your conversation history</li>
        <li>Forwarding your messages to the AI model provider (Google Gemini) to generate responses</li>
        <li>Running connector features (GitHub, Google Drive) at your explicit request</li>
        <li>Maintaining and improving the reliability of the application</li>
      </ul>
      <p>We <strong>do not sell</strong> your personal data to third parties, and we do not use your data for advertising.</p>

      <h2>3. Data Storage and Security</h2>
      <p>Account data, chat history, and API keys are stored in Cloud Firestore (Google Firebase), protected by security rules (Firestore Security Rules) so that only the account owner can access their own data. Third-party connector tokens (GitHub, Google Drive) are stored locally on your device/browser and can be deleted at any time via the "Disconnect" button in the app.</p>
      <p>While we implement reasonable security measures, no method of electronic transmission or storage is 100% secure. We cannot guarantee absolute security.</p>

      <h2>4. Sharing Data with Third Parties</h2>
      <p>We share the minimum data necessary with the following third parties, solely to operate the application's functionality:</p>
      <ul>
        <li><strong>Google Firebase</strong> — authentication, storage of chat history and API keys</li>
        <li><strong>Google Gemini API</strong> — processes your messages to generate AI responses</li>
        <li><strong>GitHub API</strong> — only if you connect the GitHub connector</li>
        <li><strong>Google Drive API</strong> — only if you connect the Google Drive connector</li>
        <li><strong>Cloudflare Workers</strong> — acts as a secure proxy for OAuth token exchange</li>
      </ul>
      <p>We do not share your data with any other party beyond the list above except as required by law.</p>

      <h2>5. Your Rights</h2>
      <ul>
        <li><strong>Access:</strong> You can view your chat history at any time within the app.</li>
        <li><strong>Deletion:</strong> You can delete conversations, disconnect connectors, or request deletion of your account and all associated data by contacting us.</li>
        <li><strong>Revoking connector access:</strong> You can disconnect GitHub or Google Drive at any time from the Connectors menu in the app, or revoke access directly from <a href="https://myaccount.google.com/permissions" target="_blank" rel="noopener">Google Account Permissions</a> / <a href="https://github.com/settings/applications" target="_blank" rel="noopener">GitHub Authorized Apps</a>.</li>
      </ul>

      <h2>6. Children's Privacy</h2>
      <p>Farvion is not intended for children under the age of 13. We do not knowingly collect personal data from children.</p>

      <h2>7. Changes to This Policy</h2>
      <p>We may update this Privacy Policy from time to time. Changes will be reflected by the "Last updated" date at the top of this page. Continued use of Farvion after changes means you accept the updated policy.</p>

      <div class="contact">
        <strong>Questions about your privacy?</strong>
        <p style="margin:8px 0 0;">Contact us at <a href="mailto:alfinpinzz6@gmail.com">alfinpinzz6@gmail.com</a></p>
      </div>

      <footer>
        Farvion — This Privacy Policy applies to the Farvion web application and all of its features.
      </footer>
    `
  }
};

function render(lang){
  const c = CONTENT[lang];
  document.title = c.docTitle;
  document.documentElement.setAttribute('lang', lang);
  document.getElementById('content').innerHTML = `
    <header>
      <span class="eyebrow">${c.eyebrow}</span>
      <h1>${c.title}</h1>
      <div class="meta">${c.updated}</div>
    </header>
    ${c.body}
  `;
}

function setLang(lang){
  localStorage.setItem('farvion_legal_lang', lang);
  document.getElementById('btnId').classList.toggle('active', lang === 'id');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  render(lang);
}

// Default: pakai preferensi tersimpan, kalau tidak ada, deteksi dari bahasa browser.
(function init(){
  const saved = localStorage.getItem('farvion_legal_lang');
  const initial = saved || (navigator.language && navigator.language.startsWith('id') ? 'id' : 'en');
  setLang(initial);
})();
</script>

</body>
</html>
