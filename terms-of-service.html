<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ketentuan Layanan — Farvion</title>
<style>
  :root{
    --ink:#1a1a1a;
    --ink-soft:#5a5a52;
    --paper:#fdfcf8;
    --cream:#f5f2ea;
    --cream-2:#eeeae0;
    --terracotta:#c1633d;
    --terracotta-deep:#a8502e;
    --border:#e2ddd0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:48px 24px 96px;
  }
  .lang-toggle{
    position:fixed;
    top:16px;
    right:16px;
    display:flex;
    background:var(--cream-2);
    border:1px solid var(--border);
    border-radius:999px;
    padding:3px;
    z-index:10;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .lang-btn{
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-size:13px;
    font-weight:700;
    letter-spacing:.02em;
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
  }
  .lang-btn.active{
    background:var(--terracotta-deep);
    color:#fff;
  }
  header{
    margin-bottom:40px;
    padding-bottom:24px;
    border-bottom:2px solid var(--border);
  }
  .eyebrow{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--terracotta-deep);
    background:var(--cream);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  h1{
    font-size:28px;
    margin:0 0 8px;
    letter-spacing:-.01em;
  }
  .meta{
    font-size:14px;
    color:var(--ink-soft);
  }
  h2{
    font-size:19px;
    margin:36px 0 12px;
    padding-top:4px;
  }
  h3{
    font-size:15px;
    margin:20px 0 8px;
    color:var(--ink);
  }
  p{ margin:0 0 14px; color:var(--ink); }
  ul, ol{ margin:0 0 14px; padding-left:22px; }
  li{ margin-bottom:6px; }
  .card{
    background:var(--cream);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    font-size:14.5px;
  }
  .card.warn{
    background:#fbeee8;
    border-color:#e3b5a0;
  }
  .card strong{ color:var(--terracotta-deep); }
  a{ color:var(--terracotta-deep); }
  .contact{
    background:var(--cream-2);
    border-radius:12px;
    padding:20px;
    margin-top:32px;
  }
  .contact a{ font-weight:600; }
  footer{
    margin-top:48px;
    padding-top:20px;
    border-top:1px solid var(--border);
    font-size:13px;
    color:var(--ink-soft);
  }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn" id="btnId" onclick="setLang('id')">ID</button>
  <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
</div>

<div class="wrap" id="content"></div>

<script>
const CONTENT = {
  id: {
    docTitle: 'Ketentuan Layanan — Farvion',

    title: 'Ketentuan Layanan Farvion',
    updated: 'Terakhir diperbarui: 20 Juli 2026',
    body: `
      <p>Ketentuan Layanan ("Ketentuan") ini mengatur penggunaan Anda atas Farvion, aplikasi chat berbasis AI ("Layanan"). Dengan mengakses atau menggunakan Farvion, Anda menyetujui untuk terikat oleh Ketentuan ini. Jika Anda tidak setuju, mohon untuk tidak menggunakan Layanan.</p>

      <h2>1. Gambaran Layanan</h2>
      <p>Farvion adalah aplikasi percakapan berbasis kecerdasan buatan yang memungkinkan Anda berinteraksi dengan model AI, menyimpan riwayat percakapan, dan secara opsional menghubungkan akun GitHub atau Google Drive Anda untuk menjelajahi dan melampirkan file ke dalam percakapan.</p>

      <h2>2. Akun Pengguna</h2>

        <li>Anda harus memberikan informasi yang akurat saat mendaftar.</li>
        <li>Anda harus berusia minimal 13 tahun untuk menggunakan Farvion.</li>

        <li>Bertanggung jawab atas file dan data apa pun yang Anda pilih untuk dilampirkan ke percakapan melalui konektor ini.</li>
        <li>Dapat memutuskan koneksi kapan saja melalui menu Konektor di dalam aplikasi.</li>
      </ul>
      <p>Penggunaan konektor ini juga tunduk pada ketentuan layanan masing-masing pihak ketiga (<a href="https://docs.github.com/site-policy/github-terms/github-terms-of-service" target="_blank" rel="noopener">GitHub Terms of Service</a> dan <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Google Terms of Service</a>).</p>

      <h2>4. Penggunaan yang Wajar</h2>
      <p>Anda setuju untuk tidak menggunakan Farvion untuk:</p>
      <ul>
        <li>Melanggar hukum yang berlaku, atau hak pihak lain (termasuk hak cipta, privasi, dan kekayaan intelektual)</li>

        <li>Mencoba mengakses sistem, akun, atau data milik pengguna lain tanpa izin</li>
        <li>Mengganggu, membebani berlebihan, atau merusak infrastruktur Farvion</li>
        <li>Menggunakan Farvion untuk menghasilkan konten yang melanggar kebijakan penggunaan penyedia AI (Google Gemini)</li>
      </ul>

      <h2>5. Konten Pengguna</h2>
      <p>Anda tetap memiliki hak atas konten (pesan, file yang dilampirkan) yang Anda kirim melalui Farvion. Dengan menggunakan Layanan, Anda memberikan izin kepada kami untuk memproses dan menyimpan konten tersebut semata-mata untuk menjalankan fungsi Layanan (misalnya meneruskannya ke model AI dan menyimpannya sebagai riwayat chat).</p>

      <div class="card warn">
        <strong>Perhatian:</strong> Respons yang dihasilkan oleh AI dapat mengandung kesalahan atau ketidakakuratan. Jangan mengandalkan output Farvion sebagai satu-satunya sumber untuk keputusan penting (medis, hukum, finansial, atau keselamatan) tanpa verifikasi lebih lanjut.
      </div>

      <h2>6. Ketersediaan Layanan</h2>
      <p>Farvion disediakan "sebagaimana adanya" (as-is) dan "sebagaimana tersedia" (as-available). Kami berupaya menjaga keandalan Layanan, namun tidak menjamin bahwa Layanan akan selalu tersedia tanpa gangguan, bebas dari kesalahan, atau bebas dari downtime — termasuk gangguan yang berasal dari penyedia pihak ketiga (Google Firebase, Google Gemini, GitHub, Cloudflare).</p>

      <h2>7. Batasan Tanggung Jawab</h2>
      <p>Sepanjang diizinkan oleh hukum yang berlaku, Farvion dan pengembangnya tidak bertanggung jawab atas kerugian tidak langsung, insidental, khusus, atau konsekuensial yang timbul dari penggunaan atau ketidakmampuan menggunakan Layanan, termasuk namun tidak terbatas pada kehilangan data, kehilangan akses akun pihak ketiga, atau kerugian akibat mengandalkan output AI.</p>

      <h2>8. Perubahan dan Penghentian Layanan</h2>
      <p>Kami berhak mengubah, menangguhkan, atau menghentikan sebagian maupun seluruh fitur Farvion kapan saja dengan atau tanpa pemberitahuan sebelumnya. Kami juga berhak menangguhkan atau menghapus akun yang terbukti melanggar Ketentuan ini.</p>

      <h2>9. Perubahan Ketentuan</h2>
      <p>Kami dapat memperbarui Ketentuan Layanan ini dari waktu ke waktu. Perubahan akan tercermin melalui tanggal "Terakhir diperbarui" di bagian atas halaman. Penggunaan Farvion setelah perubahan berarti Anda menyetujui Ketentuan yang telah diperbarui.</p>

      <h2>10. Hukum yang Berlaku</h2>
      <p>Ketentuan ini diatur dan ditafsirkan sesuai dengan hukum yang berlaku di Republik Indonesia, tanpa memperhatikan pertentangan aturan hukum.</p>

      <div class="contact">
        <strong>Pertanyaan tentang Ketentuan Layanan?</strong>
        <p style="margin:8px 0 0;">Hubungi kami di <a href="mailto:alfinpinzz6@gmail.com">alfinpinzz6@gmail.com</a></p>
      </div>

      <footer>
        Dengan menggunakan Farvion, Anda mengonfirmasi telah membaca, memahami, dan menyetujui Ketentuan Layanan ini beserta <a href="./privacy-policy.html">Kebijakan Privasi</a> kami.
      </footer>
    `
  },

function render(lang){
  const c = CONTENT[lang];
  document.title = c.docTitle;
  document.documentElement.setAttribute('lang', lang);
  document.getElementById('content').innerHTML = `
    <header>
      <span class="eyebrow">${c.eyebrow}</span>
      <h1>${c.title}</h1>
      <div class="meta">${c.updated}</div>
    </header>
    ${c.body}
  `;
}

function setLang(lang){
  localStorage.setItem('farvion_legal_lang', lang);
  document.getElementById('btnId').classList.toggle('active', lang === 'id');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  render(lang);
}

// Default: pakai preferensi tersimpan, kalau tidak ada, deteksi dari bahasa browser.
(function init(){
  const saved = localStorage.getItem('farvion_legal_lang');
  const initial = saved || (navigator.language && navigator.language.startsWith('id') ? 'id' : 'en');
  setLang(initial);
})();
</script>

</body>
</html>
